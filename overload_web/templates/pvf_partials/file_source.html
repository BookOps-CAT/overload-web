<div class="row"
  ><div class="col-2">
    <input
      class="btn-check"
      hx-get="/htmx/forms/vendor-files"
      hx-target="#file-form"
      name="file_source"
      type="radio"
      value="local"
      id="local-btn-check"
    />
    <label class="btn btn-nypl" for="local-btn-check">Local Upload</label>
  </div>
  <div class="col-2">
    <input
      class="btn-check"
      hx-get="/htmx/forms/vendor-files"
      hx-target="#file-form"
      name="file_source"
      type="radio"
      value="remote"
      id="remote-btn-check"
    />
    <label class="btn btn-nypl" for="remote-btn-check">Remote Server</label>
  </div>
  <div class="col-2"></div>
  <div id="file-form" class="col-6"></div>
</div>
