<div class="container py-3">
  <div class="row g-4">
    <div class="col">
      <div class="card h-100 shadow-sm rounded-3">
        <div class="card-body">
          <h5 class="card-title">Order Templates</h5>
          <div id="templates"
               hx-get="/ot/templates"
               hx-target="#template-list"
               hx-trigger="load"
               name="templates"></div>
          <div id="template-list"></div>
        </div>
        <div class="col" id="template-input">
          <button class="btn btn-nypl"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#collapse-template">Create/Update Order Template</button>
          <div class="collapse" id="collapse-template">
            <div class="card card-body">
              <div class="form-floating">
                <input class="btn-check"
                       hx-get="/ot/forms/templates"
                       hx-target="#template-form"
                       name="template-source"
                       value="input"
                       id="template-source"
                       hx-trigger="revealed" />
                <div id="template-form"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
