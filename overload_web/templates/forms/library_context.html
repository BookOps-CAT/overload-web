{% import "pvf_partials/macros.html" as macro %}
{% if library %}
  <div id="library-img" hx-swap-oob="true">
    <img src="{{ url_for('static', path='images/' ~ library ~ 'Logo.gif') }}"
         height="auto"
         width="auto"
         class="object-fit-scale"
         alt="library logo" />
  </div>
  {% if library == "bpl" %}<div id="collection_display" hx-swap-oob="true"></div>{% endif %}
{% else %}
  <div id="library-img" hx-swap-oob="true"></div>
{% endif %}
{{ macro.collection_form_field("collection", context_fields["collection"],
disabled=disabled) }}
